name: Rebuild index

on:
  push:
    branches: [main]

# Avoid infinite loops: the commit this workflow makes includes "[skip ci]",
# which GitHub Actions treats as a signal to not trigger further workflow runs.

jobs:
  rebuild-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate index.html
        run: python3 generate_index.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Rebuild index.html [skip ci]"
          git push
